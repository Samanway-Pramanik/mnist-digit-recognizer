<!DOCTYPE html>
<html>

<head>
<title>Digit Recognizer</title>
</head>

<body>

<h2>Upload Handwritten Digit</h2>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="image">
<input type="submit">

</form>

{% if filename %}

<h3>Uploaded Image by User</h3>

<img src="/uploads/{{ filename }}" width="200">

{% endif %}

{% if prediction != None %}

<h3>Predicted Digit: {{ prediction }}</h3>

{% endif %}

</body>
</html>
